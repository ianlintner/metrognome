name: Android

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  GODOT_VERSION: "4.6.2"
  GODOT_RELEASE: "stable"

jobs:
  build-android:
    name: Build Android AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Download Godot
        run: |
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          unzip -q "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64.zip"
          chmod +x "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64"
          sudo mv "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}
          wget -q "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          unzip -q "Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          mv templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/

      - name: Install Android Gradle build template
        run: |
          mkdir -p android/build
          unzip -q -o ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_RELEASE}/android_source.zip -d android/build/
          printf '%s.%s\n' "${GODOT_VERSION}" "${GODOT_RELEASE}" > android/.build_version
          touch android/build/.gdignore

      - name: Write release keystore from secret
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > metrognome-release.keystore

      - name: Configure preset (restore metadata + inject keystore)
        env:
          KEYSTORE_USER: ${{ secrets.ANDROID_KEYSTORE_USER }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          # Restore Android package metadata that Godot's editor sometimes wipes on re-save
          sed -i 's|export_path=""|export_path="build/android/metrognome.aab"|' export_presets.cfg
          sed -i 's|package/unique_name="com.codelintner.\$genname"|package/unique_name="com.codelintner.metrognomes"|' export_presets.cfg
          sed -i 's|package/name="metrognomes"|package/name="Metrognome"|' export_presets.cfg
          sed -i 's|version/name=""|version/name="1.0.1"|' export_presets.cfg

          # Inject keystore lines after package/signed=true (substitute if present, insert if missing)
          KEYSTORE_PATH="$(pwd)/metrognome-release.keystore"
          if grep -q '^keystore/release=' export_presets.cfg; then
            sed -i "s|^keystore/release=.*|keystore/release=\"$KEYSTORE_PATH\"|" export_presets.cfg
            sed -i "s|^keystore/release_user=.*|keystore/release_user=\"$KEYSTORE_USER\"|" export_presets.cfg
            sed -i "s|^keystore/release_password=.*|keystore/release_password=\"$KEYSTORE_PASS\"|" export_presets.cfg
          else
            sed -i "0,/^package\/signed=true$/{s|^package/signed=true$|package/signed=true\nkeystore/release=\"$KEYSTORE_PATH\"\nkeystore/release_user=\"$KEYSTORE_USER\"\nkeystore/release_password=\"$KEYSTORE_PASS\"|}" export_presets.cfg
          fi
          grep -E "keystore/release|package/signed|package/unique_name|version/name|export_format|gradle_build/use" export_presets.cfg | sed "s|$KEYSTORE_PASS|***|g"

      - name: Import project assets (creates editor_settings)
        run: godot --headless --editor --quit --path . 2>&1 | tail -5

      - name: Inject Android SDK path into Godot editor settings
        run: |
          mkdir -p ~/.config/godot
          SETTINGS=~/.config/godot/editor_settings-4.6.tres
          # Use the version-specific filename Godot 4.6 actually reads
          if [ ! -f "$SETTINGS" ]; then
            # Fall back to existing major-only file if Godot wrote one
            [ -f ~/.config/godot/editor_settings-4.tres ] && cp ~/.config/godot/editor_settings-4.tres "$SETTINGS"
          fi
          [ -f "$SETTINGS" ] || printf '[gd_resource type="EditorSettings" format=3]\n\n[resource]\n' > "$SETTINGS"
          sed -i '/export\/android\//d' "$SETTINGS"
          printf 'export/android/android_sdk_path = "/usr/local/lib/android/sdk"\n' >> "$SETTINGS"
          printf 'export/android/java_sdk_path = "%s"\n' "$JAVA_HOME" >> "$SETTINGS"
          echo "--- editor_settings contents (android lines) ---"
          grep -i android "$SETTINGS" || echo "(no android lines found)"

      - name: Verify Android toolchain layout
        run: |
          echo "--- ANDROID_HOME=$ANDROID_HOME ---"
          ls "$ANDROID_HOME" || echo "(no ANDROID_HOME dir)"
          echo "--- /usr/local/lib/android/sdk ---"
          ls /usr/local/lib/android/sdk || echo "(missing)"
          echo "--- android/ build template ---"
          ls -la android/ android/build 2>&1 | head -30
          echo "--- export_presets.cfg Android section ---"
          awk '/^\[preset\.1\]/,/^\[preset\.[0-9]+\]/' export_presets.cfg | head -40
          echo "--- editor settings file used by Godot 4.6 ---"
          ls -la ~/.config/godot/ 2>&1

      - name: Export Android AAB
        run: |
          mkdir -p build/android
          godot --headless --verbose --export-release "Android" build/android/metrognome.aab --path . 2>&1 | tail -100

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrognome-android-aab
          path: build/android/metrognome.aab
          retention-days: 30

      - name: Upload AAB to Google Play (internal track)
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GCP_PLAY_KEY_JSON }}
          packageName: com.codelintner.metrognomes
          releaseFiles: build/android/metrognome.aab
          track: internal
          status: draft
